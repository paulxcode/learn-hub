<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Hub — Data Skills</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Special+Elite&family=Quintessential&family=Marcellus&family=Exo+2:wght@300;400;600;700&family=Titillium+Web:wght@400;600;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="theme-cyberpunk">
  <div id="theme-bg"></div>

  <div id="youtube-player"></div>

  <header class="topbar">
    <div class="topbar-brand" id="logo-click">
      <span class="logo-icon" id="logo-icon">[</span>
      <h1 class="logo" id="logo-text">LEARN HUB</h1>
      <span class="logo-icon" id="logo-icon-end">]</span>
    </div>
    <input type="text" id="search" placeholder="Search lessons..." class="search-input">
    <div class="music-control" id="music-control" title="Toggle music">
      <span class="music-icon" id="music-icon">&#9835;</span>
      <span class="music-label" id="music-label">Play</span>
    </div>
    <div id="auth-control"></div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <div id="skill-tree"></div>
    </nav>

    <main class="content" id="content">
      <div class="welcome" id="welcome">
        <div class="welcome-icon" id="welcome-icon">&gt;_</div>
        <h2>Welcome to Learn Hub</h2>
        <p>8 skill trees. 120 lessons. Master data engineering.</p>
        <div class="welcome-tip">Every lesson brings you closer to real-world data engineering projects.</div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/pyodide/runner.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
